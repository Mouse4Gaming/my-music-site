<!DOCTYPE html>
<html lang="en">
<head><link rel="stylesheet" href="style.css">

</head>
<div class="menu-icon" onclick="toggleMenu()">

<div id="side-menu" class="sidebar">

<script>
function toggleMenu() {
    var menu = document.getElementById("side-menu");
    if (menu.style.width === "250px") {
        menu.style.width = "0";
    } else {
        menu.style.width = "250px";
    }
}
</script>
<body>
    <h1>My music collection</h1>

        <img src="push.jpg" class="album-art">
        <span class="category-tag">Electronic</span>
        <h2>Push the feeling on</h2>
        <p>近期最喜歡的一首歌</p>
        </div>
        <div class="music-card">
            <img src="drift.jpg" class="album-art">
            <span class="category-tag">No lyrics</span>
            <span class="category-tag">Lo-fi</span>

            <p>從影音平台上的意外收穫</p>
            </div>
            <div class="music-card">
                <img src="washing machine heart.jpg" class="album-art">
                <span class="category-tag">Electronic</span>
                <h2>Washing machine heart</h2>
                <p>有強烈的節拍感</p>
                </div>
                <div class="music-card">
                    <img src="savage garden.jpg" class="album-art">
